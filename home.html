<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- tailwind & deysui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gray-100">
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm mb-10">
      <div class="w-11/12 mx-auto flex justify-between items-center">
        <div class="flex justify-center items-center">
          <img class="w-10" src="./assets/github-logo.png" />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <label
            class="input input-bordered flex items-center gap-2 w-24 md:w-[300px]"
          >
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <input type="text" class="grow" placeholder="Search issues..." />
          </label>

          <div class="rounded-xl">
            <button class="btn btn-primary cursor-pointer">+ New issues</button>
          </div>
        </div>
      </div>
    </div>
    <div class="w-[80%] mx-auto bg-white rounded p-5 mb-5">
      <div class="flex gap-4">
        <button class="btn btn-primary pl-8 pr-8">All</button>
        <button class="text-gray-400 btn pl-8 pr-8">Open</button>
        <button class="text-gray-400 btn pl-8 pr-8">Close</button>
      </div>
    </div>
    <div
      class="w-[80%] mx-auto bg-white rounded p-5 flex flex-col md:flex-row md:justify-between md:items-center gap-4"
    >
      <div class="flex gap-4">
        <img
          class="bg-purple-300 rounded-full p-2"
          src="./assets/Aperture.png"
        />
        <div>
          <p class="font-semibold">50 issues</p>
          <p class="text-gray-400">Track and Manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-6">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span>
          <p>Open</p>
        </div>

        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
          <p>Closed</p>
        </div>
      </div>
    </div>
    <div class="w-[80%] mx-auto text-gray-300">
      <hr />
    </div>
    <div
      id="issues-container"
      class="w-[80%] mx-auto space-y-5 gap-3 grid grid-cols-1 md:grid-cols-3 mt-4"
    ></div>
    <script src="./script/home.js"></script>
  </body>
</html>
