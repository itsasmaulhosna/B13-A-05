<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- tailwind & deysui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gray-100">
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm mb-10">
      <div class="w-11/12 mx-auto flex justify-between items-center">
        <div class="flex justify-center items-center">
          <img class="w-10" src="./assets/github-logo.png" />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <label
            class="input input-bordered flex items-center gap-2 w-24 md:w-[300px]"
          >
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <input
              id="input-search"
              type="text"
              class="grow"
              placeholder="Search issues..."
            />
          </label>

          <div class="rounded-xl">
            <button id="btn-search" class="btn btn-primary cursor-pointer">
              + New issues
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="w-[80%] mx-auto bg-white rounded p-5 mb-5">
      <div class="flex gap-4">
        <button
          id="allBtn"
          class="btn btn-primary pl-8 pr-8"
          onclick="selectBtn('all', this)"
        >
          All
        </button>
        <button
          id="openBtn"
          class="text-gray-400 btn pl-8 pr-8"
          onclick="selectBtn('open', this)"
        >
          Open
        </button>
        <button
          id="closeBtn"
          class="text-gray-400 btn pl-8 pr-8"
          onclick="selectBtn('closed', this)"
        >
          Close
        </button>
      </div>
    </div>
    <div
      class="w-[80%] mx-auto bg-white rounded p-5 flex flex-col md:flex-row md:justify-between md:items-center gap-4"
    >
      <div class="flex gap-4">
        <img
          class="bg-purple-300 rounded-full p-2"
          src="./assets/Aperture.png"
        />
        <div>
          <p id="issue-count" class="font-semibold">50 issues</p>
          <p class="text-gray-400">Track and Manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-6">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span>
          <p>Open</p>
        </div>

        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
          <p>Close</p>
        </div>
      </div>
    </div>
    <div class="w-[80%] mx-auto text-gray-300">
      <hr />
    </div>
    <div
      id="issues-container"
      class="w-[80%] mx-auto space-y-5 gap-3 grid grid-cols-1 md:grid-cols-4 mt-4"
    >
      <div
        id="loddingSpinner"
        class="h-[60vh] flex justify-center items-center hidden"
      >
        <span class="loading loading-spinner loading-lg"></span>
      </div>
    </div>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->

    <dialog id="issue-detail" class="modal">
      <div class="modal-box">
        <div class="flex justify-between items-start mb-4">
          <h3 id="modalTitle" class="text-lg font-bold">Issue Title</h3>
        </div>
        <!-- modal content -->
        <div class="space-y-5">
          <div class="flex gap-3">
            <p class="text-sm text-gray-500">
              <span class="font-bold"> </span>
              <span id="modalCategory" class=""></span>
            </p>
            <p class="text-sm">
              <span>. opened by</span>
              <span id="modalAuthor"></span>
            </p>
            <p class="text-sm text-gray-500">
              <span class="font-bold">.</span>
              <span id="modalCreated"></span>
            </p>
          </div>
          <p class="text-sm text-gray-500">
            <span class="font-bold"> </span>
            <span id="modalLabels"></span>
          </p>
          <!-- <p class="text-sm text-gray-500">
              <span class="font-bold"> </span>
              <span id="modalPriority" class="badge badge-success"></span>
            </p> -->
          <p class="text-sm text-gray-600">
            <span id="modalDescription"></span>
          </p>
          <div class="bg-gray-100 w-11/12 p-2 flex justify-evenly">
            <div class="left">
              <p class="text-sm">
                <span>Assignee</span><br />
                <span id="modalAssign"></span>
              </p>
            </div>
            <div class="right">
              <p class="text-sm text-gray-500">
                <span>Priority </span>
                <br />
                <span id="modalPriority" class="badge badge-success"></span>
              </p>
            </div>
          </div>
        </div>

        <!-- Modal action -->
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./script/home.js"></script>
  </body>
</html>
